services:
  api:
    build:
      context: .
      args:
        APP: api
    container_name: home-coffing-api
    restart: unless-stopped
    ports:
      - '3011:3001'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}

  web:
    build:
      context: .
      args:
        APP: web
    container_name: home-coffing-web
    restart: unless-stopped
    ports:
      - '3010:3000'
    environment:
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
